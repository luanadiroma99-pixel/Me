<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYGEE App</title>
<style>
body { font-family: -apple-system; margin: 0; padding: 0; background:#f5f5f7; }
header { background:#000; color:#fff; padding:15px; text-align:center; }
.container { padding:15px; }
.card { background:#fff; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05);} 
input[type=checkbox] { transform: scale(1.3); margin-right:10px; }
.progress { height:10px; background:#eee; border-radius:5px; overflow:hidden; }
.progress-bar { height:10px; background:#000; width:0%; }
</style>
</head>
<body>
<header>
<h2 id="date"></h2>
</header>

<div class="container">

<div class="card">
<h3>Matin</h3>
<label><input type="checkbox">L-Thyroxine</label><br>
<label><input type="checkbox">Complément intestin (2)</label>
</div>

<div class="card">
<h3>Soir</h3>
<label><input type="checkbox">Gluco3</label><br>
<label><input type="checkbox">Magnésium</label><br>
<label><input type="checkbox">Omega 3</label><br>
<label><input type="checkbox">Vitamine D</label>
</div>

<div class="card">
<h3>Hydratation</h3>
<input type="range" min="0" max="2" step="0.1" onchange="updateWater(this.value)">
<p id="water"></p>
</div>

<div class="card">
<h3>Symptômes</h3>
<p>Ballonnements: <input type="range" min="0" max="10"></p>
<p>Reflux: <input type="range" min="0" max="10"></p>
</div>

<div class="card">
<h3>Objectif poids</h3>
<input type="number" id="currentWeight" placeholder="Poids actuel">
<input type="number" id="targetWeight" placeholder="Objectif">
<button onclick="updateProgress()">Calculer</button>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>

</div>

<script>
// Date du jour
const today = new Date();
document.getElementById('date').innerText = today.toLocaleDateString('fr-BE', { weekday:'long', day:'numeric', month:'long' });

function updateWater(val){
 document.getElementById('water').innerText = val + ' L / 2L';
}

function updateProgress(){
 let current = document.getElementById('currentWeight').value;
 let target = document.getElementById('targetWeight').value;
 let progress = ((current-target)/current)*100;
 document.getElementById('bar').style.width = progress + '%';
}
</script>

</body>
</html>
